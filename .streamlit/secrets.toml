# ─── Firebase Client Config (dùng cho Pyrebase - xử lý login) ────
[firebase_client]
apiKey = "ĐIỀN_API_KEY_CỦA_BẠN"
authDomain = "ĐIỀN_AUTH_DOMAIN"
databaseURL = ""
projectId = "ĐIỀN_PROJECT_ID"
storageBucket = "ĐIỀN_STORAGE_BUCKET"
messagingSenderId = "ĐIỀN_SENDER_ID"
appId = "ĐIỀN_APP_ID"

# ─── Firebase Admin SDK (dùng để xác minh token ở backend) ───────
[firebase_admin]
type = "service_account"
project_id = "ĐIỀN_PROJECT_ID"
private_key_id = "ĐIỀN_PRIVATE_KEY_ID"
private_key = "-----BEGIN PRIVATE KEY-----\nĐIỀN_PRIVATE_KEY\n-----END PRIVATE KEY-----\n"
client_email = "ĐIỀN_CLIENT_EMAIL"
client_id = "ĐIỀN_CLIENT_ID"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "ĐIỀN_CLIENT_X509_CERT_URL"
universe_domain = "googleapis.com"
